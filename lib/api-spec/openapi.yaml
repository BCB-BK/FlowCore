          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QualityOverview"

  /quality/pages:
    get:
      operationId: getQualityPages
      tags: [quality]
      summary: Get page quality list with filters
      parameters:
        - name: filter
          in: query
          schema:
            type: string
            enum:
              [
                no_owner,
                overdue_review,
                orphan,
                draft,
                stale,
                no_tags,
                broken_refs,
                incomplete,
              ]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated page quality list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageQualityList"

  /quality/duplicates:
    get:
      operationId: getQualityDuplicates
      tags: [quality]
      summary: Get duplicate title analysis
      responses:
        "200":
          description: Duplicate groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DuplicateGroup"

  /quality/maintenance-hints:
    get:
      operationId: getMaintenanceHints
      tags: [quality]
      summary: Get maintenance hints and conflicts
      responses:
        "200":
          description: Maintenance hints sorted by severity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceHint"

  /quality/my-work:
    get:
      operationId: getMyWork
      tags: [quality]
      summary: Get personal work items (cockpit)
      responses:
        "200":
          description: Personal work items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PersonalWorkItem"

  /quality/by-process:
    get:
      operationId: getQualityByProcess
      tags: [quality]
      summary: Get quality metrics aggregated by template/process type
      responses:
        "200":
          description: Quality metrics per template type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcessQualityRow"

  /quality/search-insights:
    get:
      operationId: getSearchInsights
      tags: [quality]
      summary: Get search analytics insights
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Search insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchInsights"

  /teams/sso:
    post:
      operationId: teamsSso
      tags: [teams]
      summary: Exchange Teams SSO token for session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ssoToken]
              properties:
                ssoToken:
                  type: string
      responses:
        "200":
          description: SSO authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsSsoResponse"
        "401":
          description: SSO authentication failed
        "403":
          description: Tenant not authorized

  /teams/context:
    get:
      operationId: teamsContext
      tags: [teams]
      summary: Get Teams app configuration
      responses:
        "200":
          description: Teams context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamsContextResponse"

  /admin/backups/config:
    get:
      operationId: getBackupConfig
      tags: [backups]
      summary: Get backup configuration
      responses:
        "200":
          description: Current backup configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupConfig"
    put:
      operationId: updateBackupConfig
      tags: [backups]
      summary: Update backup configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupConfigUpdate"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupConfig"

  /admin/backups/run:
    post:
      operationId: triggerBackup
      tags: [backups]
      summary: Trigger a manual backup
      responses:
        "200":
          description: Backup started
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  status:
                    type: string
                required:
                  - id
                  - status
        "409":
          description: Backup already running

  /admin/backups/runs:
    get:
      operationId: listBackupRuns
      tags: [backups]
      summary: List backup runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of backup runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackupRun"

  /admin/backups/runs/{id}:
    get:
      operationId: getBackupRun
      tags: [backups]
      summary: Get a single backup run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupRun"
        "404":
          description: Not found

  /admin/backups/runs/{id}/restore:
    post:
      operationId: restoreBackup
      tags: [backups]
      summary: Restore from a backup run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restore result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
        "400":
          description: Restore failed

  /admin/backups/validate-target:
    post:
      operationId: validateBackupTarget
      tags: [backups]
      summary: Validate a SharePoint backup target
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driveId:
                  type: string
                folderId:
                  type: string
                  nullable: true
              required:
                - driveId
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  error:
                    type: string
                    nullable: true
                required:
                  - valid

components:
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RevisionId:
      name: revisionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RelationId:
      name: relationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PrincipalId:
      name: principalId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database:
          type: string
          enum: [connected, disconnected]
      required:
        - status
        - database

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ContentNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        immutableId:
          type: string
        displayCode:
          type: string
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
            - glossary
            - work_instruction
            - checklist
            - faq
            - interface_description
            - meeting_protocol
            - training_resource
            - audit_object
        templateId:
          type: string
          format: uuid
          nullable: true
        parentNodeId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, in_review, approved, published, archived, deleted]
        currentRevisionId:
          type: string
          format: uuid
          nullable: true
        publishedRevisionId:
          type: string
          format: uuid
          nullable: true
        ownerId:
          type: string
          nullable: true
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - immutableId
        - displayCode
        - title
        - templateType
        - sortOrder
        - status
        - isDeleted
        - createdAt
        - updatedAt

    CreateNodeInput:
      type: object
      properties:
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
            - glossary
            - work_instruction
            - checklist
            - faq
            - interface_description
            - meeting_protocol
            - training_resource
            - audit_object
        templateId:
          type: string
          format: uuid
        parentNodeId:
          type: string
          format: uuid
        ownerId:
          type: string
        sortOrder:
          type: integer
      required:
        - title
        - templateType

    UpdateNodeInput:
      type: object
      properties:
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
            - glossary
            - work_instruction
            - checklist
            - faq
            - interface_description
            - meeting_protocol
            - training_resource
            - audit_object

    MoveNodeInput:
      type: object
      properties:
        newParentNodeId:
          type: string
          format: uuid
          nullable: true
        actorId:
          type: string

    ContentAlias:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        previousDisplayCode:
          type: string
        reason:
          type: string
        changedBy:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - previousDisplayCode
        - reason
        - changedAt

    TreeNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        displayCode:
          type: string
        depth:
          type: integer
        parentNodeId:
          type: string
          format: uuid
          nullable: true
      required:
        - id
        - title
        - displayCode
        - depth

    ContentRevision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        revisionNo:
          type: integer
        versionLabel:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published, archived, deleted]
        changeType:
          type: string
          enum: [editorial, minor, major, regulatory, structural]
        changeSummary:
          type: string
          nullable: true
        title:
          type: string
        content:
          type: object
          nullable: true
        structuredFields:
          type: object
          nullable: true
        basedOnRevisionId:
          type: string
          format: uuid
          nullable: true
        authorId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - revisionNo
        - status
        - changeType
        - title
        - createdAt

    CreateRevisionInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: object
        structuredFields:
          type: object
        changeType:
          type: string
          enum: [editorial, minor, major, regulatory, structural]
        changeSummary:
          type: string
        authorId:
          type: string
      required:
        - title

    PublishRevisionInput:
      type: object
      properties:
        versionLabel:
          type: string
      required:
        - versionLabel

    RestoreRevisionInput:
      type: object
      properties:
        authorId:
          type: string

    ReviewWorkflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, in_progress, approved, rejected, cancelled]
        requiredApprovals:
          type: integer
        currentStep:
          type: integer
        initiatedBy:
          type: string
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - revisionId
        - status
        - createdAt

    ReviewWorkflowDetail:
      allOf:
        - $ref: "#/components/schemas/ReviewWorkflow"
        - type: object
          properties:
            approvals:
              type: array
              items:
                $ref: "#/components/schemas/Approval"

    Approval:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        stepNumber:
          type: integer
        reviewerId:
          type: string
          nullable: true
        decision:
          type: string
          enum: [approved, rejected, returned_for_changes]
          nullable: true
        comment:
          type: string
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - workflowId
        - revisionId
        - stepNumber
        - createdAt

    RevisionEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            [
              created,
              submitted_for_review,
              review_approved,
              review_rejected,
              published,
              archived,
              restored,
              superseded,
            ]
        actorId:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - revisionId
        - eventType
        - createdAt

    RevisionDiff:
      type: object
      properties:
        revisionA:
          type: object
          properties:
            id:
              type: string
              format: uuid
            revisionNo:
              type: integer
            title:
              type: string
            status:
              type: string
            createdAt:
              type: string
              format: date-time
            authorId:
              type: string
              nullable: true
        revisionB:
          type: object
          properties:
            id:
              type: string
              format: uuid
            revisionNo:
              type: integer
            title:
              type: string
            status:
              type: string
            createdAt:
              type: string
              format: date-time
            authorId:
              type: string
              nullable: true
        metadataChanges:
          type: object
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}
        structuredFieldChanges:
          type: object
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}
        contentChanged:
          type: boolean
        contentA:
          type: object
          nullable: true
        contentB:
          type: object
          nullable: true

    PageWatcher:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        principalId:
          type: string
          format: uuid
        watchChildren:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - principalId
        - watchChildren
        - createdAt

    ContentRelation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        relationType:
          type: string
          enum:
            - related_to
            - uses_template
            - depends_on
            - implements_policy
            - upstream_of
            - downstream_of
            - replaces
            - references
        description:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sourceNodeId
        - targetNodeId
        - relationType
        - createdAt

    CreateRelationInput:
      type: object
      properties:
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        relationType:
          type: string
          enum:
            - related_to
            - uses_template
            - depends_on
            - implements_policy
            - upstream_of
            - downstream_of
            - replaces
            - references
        description:
          type: string
        createdBy:
          type: string
      required:
        - sourceNodeId
        - targetNodeId
        - relationType

    PageTypeDefinition:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        labelDe:
          type: string
        description:
          type: string
        descriptionDe:
          type: string
        icon:
          type: string
        color:
          type: string
        category:
          type: string
          enum: [process, documentation, governance, system]
        allowedChildTypes:
          type: array
          items:
            type: string
        metadataFields:
          type: array
          items:
            $ref: "#/components/schemas/MetadataFieldDef"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/PageTypeSection"
        helpText:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/TemplateVariant"
      required:
        - type
        - label
        - labelDe
        - description
        - descriptionDe
        - icon
        - color
        - category
        - allowedChildTypes
        - metadataFields
        - sections
        - variants

    MetadataFieldDef:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, date, person, enum, tags, number, boolean]
        required:
          type: boolean
        group:
          type: string
          enum:
            [identity, governance, responsibilities, validity, classification]
        description:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
          nullable: true
      required:
        - key
        - label
        - type
        - required
        - group

    PageTypeSection:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        required:
          type: boolean
      required:
        - key
        - label
        - required

    TemplateVariant:
