        key:
          type: string
        label:
          type: string
        description:
          type: string
        prefilledSections:
          type: array
          items:
            type: string
      required:
        - key
        - label
        - description

    ContentTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        templateType:
          type: string
        description:
          type: string
          nullable: true
        fieldSchema:
          type: object
        version:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
