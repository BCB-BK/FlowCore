          type: string
          format: uuid
        externalId:
          type: string
        principalType:
          type: string
          enum: [user, group, service_account]
        displayName:
          type: string
        email:
          type: string
          nullable: true
        upn:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, blocked]
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - externalId
        - principalType
        - displayName
        - status
        - createdAt
        - updatedAt

    PrincipalWithRoles:
      allOf:
        - $ref: "#/components/schemas/Principal"
        - type: object
          properties:
            roles:
              type: array
              items:
                $ref: "#/components/schemas/RoleAssignment"

    RoleAssignment:
      type: object
