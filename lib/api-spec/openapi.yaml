            type: string
            format: uuid
      responses:
        "200":
          description: Media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMediaAsset
      tags: [media]
      summary: Delete a media asset
      parameters:
        - name: assetId
