openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Enterprise Wiki API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and session operations
  - name: principals
    description: Principal (user/group) management
  - name: rbac
    description: Role-based access control
  - name: content
    description: Content node operations
  - name: revisions
    description: Revision and version operations
  - name: relations
    description: Content relation/graph operations
  - name: templates
    description: Template operations
  - name: media
    description: Media asset management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status with database connectivity
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    get:
      operationId: authLogin
      tags: [auth]
      summary: Initiate SSO login
      description: Redirects to Microsoft Entra ID login page. In dev mode, returns dev user list.
      responses:
        "302":
          description: Redirect to Entra ID
        "200":
          description: Dev mode login info
          content:
            application/json:
              schema:
                type: object

  /auth/callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: SSO callback
      description: Handles the Entra ID OAuth redirect, exchanges code for token, upserts principal, establishes session.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth authorization code
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Authentication failed

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current user
      description: Returns the currently authenticated user info.
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout
      description: Destroys the session and logs out.
      responses:
        "200":
          description: Logged out

  /auth/dev-users:
    get:
      operationId: listDevUsers
      tags: [auth]
      summary: List dev users (dev mode only)
      responses:
        "200":
          description: Dev user list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DevUser"
        "404":
          description: Not available in production

  /principals:
    get:
      operationId: listPrincipals
      tags: [principals]
      summary: List or search principals
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of principals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Principal"

  /principals/{principalId}:
    get:
      operationId: getPrincipal
      tags: [principals]
      summary: Get a principal by ID
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      responses:
        "200":
          description: Principal with roles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrincipalWithRoles"
        "404":
          description: Not found

  /principals/{principalId}/permissions:
    get:
      operationId: getPrincipalPermissions
      tags: [rbac]
      summary: Get effective permissions for a principal
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
        - name: nodeId
          in: query
          schema:
            type: string
            format: uuid
          description: Optional node ID for page-level permissions
      responses:
        "200":
          description: Effective permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EffectivePermissions"

  /principals/{principalId}/roles:
    post:
      operationId: assignRole
      tags: [rbac]
      summary: Assign a role to a principal
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleInput"
      responses:
        "201":
          description: Role assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignmentId:
                    type: string
                    format: uuid

  /principals/{principalId}/roles/{assignmentId}:
    delete:
      operationId: revokeRole
      tags: [rbac]
      summary: Revoke a role assignment
      parameters:
        - $ref: "#/components/parameters/PrincipalId"
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role revoked

  /rbac/matrix:
    get:
      operationId: getRolePermissionMatrix
      tags: [rbac]
      summary: Get the role-permission matrix
      responses:
        "200":
          description: Role-permission matrix
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    type: string

  /graph/people:
    get:
      operationId: searchPeople
      tags: [principals]
      summary: Search people via Microsoft Graph
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: People results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GraphPerson"

  /graph/groups:
    get:
      operationId: searchGroups
      tags: [principals]
      summary: Search groups via Microsoft Graph
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GraphGroup"

  /content/nodes/{nodeId}/permissions:
    get:
      operationId: getPagePermissions
      tags: [rbac]
      summary: Get page-level permissions for a node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Page permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PagePermission"
    post:
      operationId: grantPagePermission
      tags: [rbac]
      summary: Grant a page-level permission
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantPagePermissionInput"
      responses:
        "201":
          description: Permission granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid

  /content/nodes/{nodeId}/permissions/{permId}:
    delete:
      operationId: revokePagePermission
      tags: [rbac]
      summary: Revoke a page-level permission
      parameters:
        - $ref: "#/components/parameters/NodeId"
        - name: permId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Permission revoked

  /content/nodes/{nodeId}/ownership:
    get:
      operationId: getNodeOwnership
      tags: [rbac]
      summary: Get ownership info for a node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Node ownership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeOwnership"
    put:
      operationId: setNodeOwnership
      tags: [rbac]
      summary: Set ownership for a node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetNodeOwnershipInput"
      responses:
        "200":
          description: Ownership updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid

  /content/nodes:
    get:
      operationId: listNodes
      tags: [content]
      summary: List all content nodes
      responses:
        "200":
          description: List of content nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentNode"
    post:
      operationId: createNode
      tags: [content]
      summary: Create a content node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentNode"

  /content/nodes/roots:
    get:
      operationId: listRootNodes
      tags: [content]
      summary: List root content nodes
      responses:
        "200":
          description: Root nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentNode"

  /content/nodes/{nodeId}:
    get:
      operationId: getNode
      tags: [content]
      summary: Get a content node by ID
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Content node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentNode"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNode
      tags: [content]
      summary: Update a content node's metadata
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNodeInput"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentNode"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteNode
      tags: [content]
      summary: Soft-delete a content node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "204":
          description: Deleted

  /content/nodes/{nodeId}/children:
    get:
      operationId: getNodeChildren
      tags: [content]
      summary: Get children of a content node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Child nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentNode"

  /content/nodes/{nodeId}/ancestors:
    get:
      operationId: getNodeAncestors
      tags: [content]
      summary: Get ancestor chain of a content node
      description: Returns the ancestor nodes from root to the direct parent, ordered root-first.
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Ancestor nodes (root-first order)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentNode"
        "404":
          description: Not found

  /content/nodes/{nodeId}/move:
    post:
      operationId: moveNode
      tags: [content]
      summary: Move a node to a new parent
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveNodeInput"
      responses:
        "200":
          description: Moved node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentNode"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/nodes/{nodeId}/aliases:
    get:
      operationId: getNodeAliases
      tags: [content]
      summary: Get display code alias history
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Alias history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentAlias"

  /content/nodes/{nodeId}/tree:
    get:
      operationId: getNodeTree
      tags: [content]
      summary: Get hierarchical subtree
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Tree data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreeNode"

  /content/nodes/{nodeId}/revisions:
    get:
      operationId: listNodeRevisions
      tags: [revisions]
      summary: Get revisions for a node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Revision list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentRevision"
    post:
      operationId: createRevision
      tags: [revisions]
      summary: Create a new revision
      parameters:
        - $ref: "#/components/parameters/NodeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRevisionInput"
      responses:
        "201":
          description: Created revision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRevision"

  /content/revisions/{revisionId}/publish:
    post:
      operationId: publishRevision
      tags: [revisions]
      summary: Publish a revision with a version label
      parameters:
        - $ref: "#/components/parameters/RevisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRevisionInput"
      responses:
        "200":
          description: Published revision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRevision"

  /content/revisions/{revisionId}/restore:
    post:
      operationId: restoreRevision
      tags: [revisions]
      summary: Restore a previous revision as a new revision
      parameters:
        - $ref: "#/components/parameters/RevisionId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreRevisionInput"
      responses:
        "201":
          description: New revision created from restored content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRevision"

  /content/nodes/{nodeId}/relations:
    get:
      operationId: getNodeRelations
      tags: [relations]
      summary: Get relations for a node
      parameters:
        - $ref: "#/components/parameters/NodeId"
      responses:
        "200":
          description: Relations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentRelation"

  /content/relations:
    post:
      operationId: createRelation
      tags: [relations]
      summary: Create a relation between nodes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRelationInput"
      responses:
        "201":
          description: Created relation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRelation"
        "400":
          description: Validation error (cycle, self-ref)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/relations/{relationId}:
    delete:
      operationId: deleteRelation
      tags: [relations]
      summary: Delete a relation
      parameters:
        - $ref: "#/components/parameters/RelationId"
      responses:
        "204":
          description: Deleted

  /content/page-types:
    get:
      operationId: listPageTypes
      tags: [templates]
      summary: List all page type definitions from the registry
      description: Returns the page type registry with metadata fields, sections, allowed children, icons, and completeness rules.
      responses:
        "200":
          description: Page type registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PageTypeDefinition"

  /content/page-types/{templateType}:
    get:
      operationId: getPageType
      tags: [templates]
      summary: Get a single page type definition
      parameters:
        - name: templateType
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Page type definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageTypeDefinition"
        "404":
          description: Not found

  /content/templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all content templates
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentTemplate"

  /content/templates/{templateId}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a template by ID
      parameters:
        - $ref: "#/components/parameters/TemplateId"
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentTemplate"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/upload:
    post:
      operationId: uploadMedia
      tags: [media]
      summary: Upload a media file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                altText:
                  type: string
                caption:
                  type: string
                nodeId:
                  type: string
                  format: uuid
              required:
                - file
      responses:
        "201":
          description: Uploaded media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/assets:
    get:
      operationId: listMediaAssets
      tags: [media]
      summary: List media assets
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: classification
          in: query
          schema:
            type: string
            enum: [document, image, video, audio, spreadsheet, presentation, template, form, archive, other]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of media assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAsset"

  /media/assets/{assetId}:
    get:
      operationId: getMediaAsset
      tags: [media]
      summary: Get a media asset by ID
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteMediaAsset
      tags: [media]
      summary: Delete a media asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /media/files/{key}:
    get:
      operationId: serveMediaFile
      tags: [media]
      summary: Serve a media file by storage key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /media/assets/{assetId}/usages:
    post:
      operationId: trackMediaUsage
      tags: [media]
      summary: Track usage of a media asset in a node
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
                  format: uuid
                revisionId:
                  type: string
                  format: uuid
                usageContext:
                  type: string
      responses:
        "201":
          description: Usage record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAssetUsage"
    get:
      operationId: getMediaUsages
      tags: [media]
      summary: Get usages of a media asset
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of usages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MediaAssetUsage"

components:
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RevisionId:
      name: revisionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RelationId:
      name: relationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PrincipalId:
      name: principalId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database:
          type: string
          enum: [connected, disconnected]
      required:
        - status
        - database

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ContentNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        immutableId:
          type: string
        displayCode:
          type: string
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
        templateId:
          type: string
          format: uuid
          nullable: true
        parentNodeId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, in_review, approved, published, archived, deleted]
        currentRevisionId:
          type: string
          format: uuid
          nullable: true
        publishedRevisionId:
          type: string
          format: uuid
          nullable: true
        ownerId:
          type: string
          nullable: true
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - immutableId
        - displayCode
        - title
        - templateType
        - sortOrder
        - status
        - isDeleted
        - createdAt
        - updatedAt

