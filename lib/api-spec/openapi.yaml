      summary: Full-text search across content nodes
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: templateType
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: tagId
          in: query
          schema:
            type: string
            format: uuid
        - name: ownerId
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Search results with facets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"

  /search/suggestions:
    get:
