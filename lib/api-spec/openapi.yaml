            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagId:
                  type: string
                  format: uuid
              required: [tagId]
      responses:
        "201":
          description: Assigned

  /tags/nodes/{nodeId}/{tagId}:
    delete:
      operationId: removeTagFromNode
