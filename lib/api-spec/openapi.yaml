            - process_manager
            - editor
            - reviewer
            - approver
            - compliance_manager
            - viewer
        scope:
          type: string
          nullable: true
        grantedBy:
          type: string
          format: uuid
        grantedAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - principalId
        - role
        - grantedAt

    EffectivePermissions:
      type: object
      properties:
        principalId:
          type: string
          format: uuid
        permissions:
          type: array
          items:
            type: string
      required:
        - principalId
        - permissions

    CreatePrincipalInput:
      type: object
      properties:
        externalId:
          type: string
          description: External ID from identity provider (e.g. Entra Object ID)
        principalType:
          type: string
          enum:
            - user
            - group
            - service_account
        displayName:
          type: string
        email:
          type: string
          nullable: true
        upn:
          type: string
          nullable: true
      required:
        - externalId
        - principalType
        - displayName

    AssignRoleInput:
      type: object
      properties:
        role:
          type: string
          enum:
            - system_admin
            - process_manager
            - editor
            - reviewer
            - approver
            - compliance_manager
            - viewer
        scope:
          type: string
          nullable: true
      required:
        - role

    PagePermission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        principalId:
          type: string
          format: uuid
        permission:
          type: string
        grantedBy:
