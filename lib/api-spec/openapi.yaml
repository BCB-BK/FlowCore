components:
  parameters:
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RevisionId:
      name: revisionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RelationId:
      name: relationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PrincipalId:
      name: principalId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        database:
          type: string
          enum: [connected, disconnected]
      required:
        - status
        - database

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ContentNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        immutableId:
          type: string
        displayCode:
          type: string
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
        templateId:
          type: string
          format: uuid
          nullable: true
        parentNodeId:
          type: string
          format: uuid
          nullable: true
        sortOrder:
          type: integer
        status:
          type: string
          enum: [draft, in_review, approved, published, archived, deleted]
        currentRevisionId:
          type: string
          format: uuid
          nullable: true
        publishedRevisionId:
          type: string
          format: uuid
          nullable: true
        ownerId:
          type: string
          nullable: true
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - immutableId
        - displayCode
        - title
        - templateType
        - sortOrder
        - status
        - isDeleted
        - createdAt
        - updatedAt

    CreateNodeInput:
      type: object
      properties:
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation
        templateId:
          type: string
          format: uuid
        parentNodeId:
          type: string
          format: uuid
        ownerId:
          type: string
        sortOrder:
          type: integer
      required:
        - title
        - templateType

    UpdateNodeInput:
      type: object
      properties:
        title:
          type: string
        templateType:
          type: string
          enum:
            - core_process_overview
            - area_overview
            - process_page_text
            - process_page_graphic
            - procedure_instruction
            - use_case
            - policy
            - role_profile
            - dashboard
            - system_documentation

    MoveNodeInput:
      type: object
      properties:
        newParentNodeId:
          type: string
          format: uuid
          nullable: true
        actorId:
          type: string

    ContentAlias:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        previousDisplayCode:
          type: string
        reason:
          type: string
        changedBy:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - previousDisplayCode
        - reason
        - changedAt

    TreeNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        displayCode:
          type: string
        depth:
          type: integer
        parentNodeId:
          type: string
          format: uuid
          nullable: true
      required:
        - id
        - title
        - displayCode
        - depth

    ContentRevision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        revisionNo:
          type: integer
        versionLabel:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, in_review, approved, published, archived, deleted]
        changeType:
          type: string
          enum: [editorial, minor, major, regulatory, structural]
        changeSummary:
          type: string
          nullable: true
        title:
          type: string
        content:
          type: object
          nullable: true
        structuredFields:
          type: object
          nullable: true
        basedOnRevisionId:
          type: string
          format: uuid
          nullable: true
        authorId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - revisionNo
        - status
        - changeType
        - title
        - createdAt

    CreateRevisionInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: object
        structuredFields:
          type: object
        changeType:
          type: string
          enum: [editorial, minor, major, regulatory, structural]
        changeSummary:
          type: string
        authorId:
          type: string
      required:
        - title

    PublishRevisionInput:
      type: object
      properties:
        versionLabel:
          type: string
      required:
        - versionLabel

    RestoreRevisionInput:
      type: object
      properties:
        authorId:
          type: string

    ReviewWorkflow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, in_progress, approved, rejected, cancelled]
        requiredApprovals:
          type: integer
        currentStep:
          type: integer
        initiatedBy:
          type: string
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - revisionId
        - status
        - createdAt

    ReviewWorkflowDetail:
      allOf:
        - $ref: "#/components/schemas/ReviewWorkflow"
        - type: object
          properties:
            approvals:
              type: array
              items:
                $ref: "#/components/schemas/Approval"

    Approval:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workflowId:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        stepNumber:
          type: integer
        reviewerId:
          type: string
          nullable: true
        decision:
          type: string
          enum: [approved, rejected, returned_for_changes]
          nullable: true
        comment:
          type: string
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - workflowId
        - revisionId
        - stepNumber
        - createdAt

    RevisionEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        revisionId:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [created, submitted_for_review, review_approved, review_rejected, published, archived, restored, superseded]
        actorId:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - revisionId
        - eventType
        - createdAt

    RevisionDiff:
      type: object
      properties:
        revisionA:
          type: object
          properties:
            id:
              type: string
              format: uuid
            revisionNo:
              type: integer
            title:
              type: string
            status:
              type: string
            createdAt:
              type: string
              format: date-time
            authorId:
              type: string
              nullable: true
        revisionB:
          type: object
          properties:
            id:
              type: string
              format: uuid
            revisionNo:
              type: integer
            title:
              type: string
            status:
              type: string
            createdAt:
              type: string
              format: date-time
            authorId:
              type: string
              nullable: true
        metadataChanges:
          type: object
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}
        structuredFieldChanges:
          type: object
          additionalProperties:
            type: object
            properties:
              old: {}
              new: {}
        contentChanged:
          type: boolean
        contentA:
          type: object
          nullable: true
        contentB:
          type: object
          nullable: true

    PageWatcher:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        principalId:
          type: string
          format: uuid
        watchChildren:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nodeId
        - principalId
        - watchChildren
        - createdAt

    ContentRelation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        relationType:
          type: string
          enum:
            - related_to
            - uses_template
            - depends_on
            - implements_policy
            - upstream_of
            - downstream_of
            - replaces
            - references
        description:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sourceNodeId
        - targetNodeId
        - relationType
        - createdAt

    CreateRelationInput:
      type: object
      properties:
        sourceNodeId:
          type: string
          format: uuid
        targetNodeId:
          type: string
          format: uuid
        relationType:
          type: string
          enum:
            - related_to
            - uses_template
            - depends_on
            - implements_policy
            - upstream_of
            - downstream_of
            - replaces
            - references
        description:
          type: string
        createdBy:
          type: string
      required:
        - sourceNodeId
        - targetNodeId
        - relationType

    PageTypeDefinition:
      type: object
      properties:
        type:
          type: string
        label:
          type: string
        labelDe:
          type: string
        description:
          type: string
        descriptionDe:
          type: string
        icon:
          type: string
        color:
          type: string
        category:
          type: string
          enum: [process, documentation, governance, system]
        allowedChildTypes:
          type: array
          items:
            type: string
        metadataFields:
          type: array
          items:
            $ref: "#/components/schemas/MetadataFieldDef"
        sections:
          type: array
          items:
            $ref: "#/components/schemas/PageTypeSection"
        helpText:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/TemplateVariant"
      required:
